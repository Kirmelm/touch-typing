<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KirmelK touch typing</title>
    <link rel="stylesheet" href="stile.css">
</head>
<body>

<div id="stats-bar">
    <div class="stat-item">Ошибок за сессию: <span id="errors">0</span></div>
    <div class="stat-item">Всего «трудных» букв: <span id="bad-count">0</span></div>
</div>

<div id="text-display"></div>
<div class="keyboard" id="keyboard"></div>

<div id="bad-chars-box">
    <div>Твои слабые места (сохранено):</div>
    <div id="bad-list"></div>
    <button onclick="clearMemory()" style="margin-top:10px; background:none; border:1px solid #444; color:#666; cursor:pointer; border-radius:4px;">Сбросить память</button>
</div>
<script src="logik.js"></script>
</body>
</html>
